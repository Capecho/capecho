name: capecho
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
# Dev default only. Release builds derive name+number from the canonical /VERSION file via
# scripts/macos/version.sh (passed as flutter build --build-name/--build-number). Keep the
# build number here in sync with that scheme (0.1.0.0 -> 10000) so dev builds aren't misleading.
version: 0.1.14+11400

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # The cross-platform native capture plugin (macOS now, Windows later).
  capture_native:
    path: ../capture_native

  # The platform-neutral reconstruction core (CaptureResult lives here).
  capecho_capture_core:
    path: ../../shared/capture-core

  # The device-local store (drain of the native journal; dedup; soft-delete).
  capecho_local_store:
    path: ../../shared/local-store

  # The shared typed backend client (auth, words, review, sync, claim).
  capecho_api:
    path: ../../shared/api-client

  # The shared app core (auth + review controllers, sign-in panel, design system, HTTP transport) —
  # ONE implementation shared with the mobile client so the auth/review logic can't drift. The macOS
  # surfaces that still live here (Word Book, Settings, onboarding) re-export from it via thin shims.
  capecho_app_core:
    path: ../../shared/app-core

  # SQLite for the device-local store (capecho_local_store). v3+ loads SQLite via Dart native-assets
  # (build hooks) and bundles it itself, so sqlite3_flutter_libs is no longer needed. (The Anki `.apkg`
  # builder moved to shared app-core — it brings its own archive/crypto/sqlite3 — so those direct deps
  # are no longer declared here.)
  sqlite3: ^3.3.2
  # Resolves the Application Support directory (co-located with the native journal).
  path_provider: ^2.1.0

  # Networking for the account/sync layer (M3). Pure Dart — no native plugin.
  http: ^1.2.0

  # Native Apple + Google sign-in (M3). Both ship Swift Package Manager support, so they resolve
  # through Flutter's generated SPM package — NO Podfile, the macOS app stays SwiftPM-pure. (Token
  # storage stays the file-based SessionStore; flutter_secure_storage is NOT used — its macOS variant
  # lacks SPM support and would drag CocoaPods back in.)
  sign_in_with_apple: ^8.0.0
  google_sign_in: ^7.2.0

  # Opens external links (the privacy explainer) in the default browser. SwiftPM-supported, so it
  # resolves through Flutter's generated SPM package — keeps the macOS app CocoaPods-free.
  url_launcher: ^6.3.0

  # Settings → About: read the running app's version from the bundle. SwiftPM-supported (plus_plugins),
  # so it resolves through Flutter's generated SPM package — keeps the macOS app CocoaPods-free.
  package_info_plus: ^8.0.0

  # Pro subscription on the Mac App Store build (T10 Phase 2): the Apple-IAP rail. The buy controller is
  # shared in capecho_app_core; this declares the plugin so macOS resolves the StoreKit impl. The dep,
  # `in_app_purchase_storekit`, ships a Swift Package Manager manifest + declares macOS support
  # (sharedDarwinSource), so it resolves through Flutter's generated SPM package and keeps the macOS app
  # CocoaPods-free (same rule as the plugins above). The direct (Developer ID) build never reaches the
  # IAP code path — it uses the Stripe web rail — but linking StoreKit is harmless there.
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Used only by widget_test.dart to mock the Application Support path + plugins.
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

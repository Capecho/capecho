name: ci

# Path-filtered to conserve CI minutes: a commit that touches ONLY docs/design/markdown (the design
# mockups, the product docs, CHANGELOG, VERSION, .gitignore) skips CI entirely. ANY code change still
# runs the full suite. (paths-ignore duplicated under push/pull_request on purpose — no YAML anchors.)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'design/**'
      - '**/*.md'
      - 'VERSION'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'design/**'
      - '**/*.md'
      - 'VERSION'
      - '.gitignore'

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TypeScript: workspace typecheck + all bun tests (backend + shared/*).
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Typecheck (all workspace packages)
        run: pnpm -r typecheck
      - name: Tests (backend + shared)
        run: bun test
      # Integration tests run INSIDE workerd (Miniflare) with the real D1 + R2 + Durable Object
      # bindings — covering the spend/generation DO chain, the real-D1 BLOB path, and the
      # multi-client sync interleave (ENG-5) that the in-process bun harness stubs.
      - name: Integration tests (workerd via @cloudflare/vitest-pool-workers)
        run: pnpm --filter @capecho/backend test:integration

  # Capture client (M2-PR2): the shared pure-Dart reconstruction core + the
  # capture_native plugin + the macOS app's Dart side. Linux-only on purpose — the
  # native Swift build + real capture stay on the founder's Mac, so we do NOT add a
  # (10x-cost) macOS runner. Path-scoped via dorny/paths-filter so it is a near-zero
  # no-op on backend-only PRs and only does real work when capture/client code
  # changes. `flutter analyze`/`flutter test` here are Dart-only (mocked channels);
  # they never build the macOS platform.
  capture-dart:
    runs-on: ubuntu-latest
    # dorny/paths-filter calls the PR "list files" API; the default GITHUB_TOKEN
    # is read-contents-only on this repo, so grant pull-requests:read explicitly.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: |
            client:
              - 'shared/capture-core/**'
              - 'shared/local-store/**'
              - 'shared/api-client/**'
              - 'shared/app-core/**'
              - 'clients/**'
              - '.github/workflows/ci.yml'
      - if: steps.changed.outputs.client == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true
      - name: capture-core (pure Dart) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: shared/capture-core
        run: |
          dart pub get
          dart analyze
          dart test
      - name: api-client (pure Dart) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: shared/api-client
        run: |
          dart pub get
          dart analyze
          dart test
      - name: install libsqlite3 (local-store dart tests use package:sqlite3)
        if: steps.changed.outputs.client == 'true'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0
      - name: local-store (pure Dart) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: shared/local-store
        run: |
          dart pub get
          dart analyze
          dart test
      - name: app-core (Flutter, Dart-only) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: shared/app-core
        run: |
          flutter pub get
          flutter analyze
          flutter test
      - name: capture_native plugin — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: clients/capture_native
        run: |
          flutter pub get
          flutter analyze
          flutter test
      - name: macOS app (Dart side) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: clients/macos
        run: |
          flutter pub get
          flutter analyze
          flutter test
      - name: mobile app (Dart side) — analyze + test
        if: steps.changed.outputs.client == 'true'
        working-directory: clients/mobile
        run: |
          flutter pub get
          flutter analyze
          flutter test
      # Formatting gate — runs LAST, after every package above has `pub get`-ed, so `dart format`
      # resolves each package's analysis_options (page_width: 100) AND its language version from the
      # now-present .dart_tool (it formats per-file, walking up to the nearest config). Run earlier
      # (pre-pub-get) it can't resolve those and falls back to defaults — width 80 + a different
      # trailing-comma/wrapping style — reporting spurious "changed" files. Excludes generated tokens.
      - name: Format check (dart format --set-exit-if-changed)
        if: steps.changed.outputs.client == 'true'
        run: |
          find shared clients -name '*.dart' \
            -not -path '*/.dart_tool/*' -not -path '*/build/*' -not -path '*/generated/*' -print0 \
            | xargs -0 dart format -l 100 --output=none --set-exit-if-changed

  # iOS review-widget Swift logic (WidgetReviewKit): the snapshot decoder + the reveal/grade state
  # machine. Foundation-only + ZERO dependencies, so `swift test` runs on a cheap LINUX runner (no
  # macOS — same cost discipline as capture-dart) and pins BOTH cross-language contracts: the snapshot
  # and grade-event golden fixtures the Dart side also asserts. Path-scoped so it's a no-op elsewhere.
  widget-kit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: |
            widget:
              - 'clients/mobile/ios/WidgetReviewKit/**'
              - 'shared/app-core/test/fixtures/widget_review_snapshot.golden.json'
              - 'shared/app-core/test/fixtures/widget_grade_event.golden.json'
              - '.github/workflows/ci.yml'
      - if: steps.changed.outputs.widget == 'true'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'
      - name: WidgetReviewKit — swift test
        if: steps.changed.outputs.widget == 'true'
        working-directory: clients/mobile/ios/WidgetReviewKit
        run: swift test
